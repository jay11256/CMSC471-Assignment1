<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment 1</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>
    <div id="main-container">
        <h1>Daily Weather in Maryland 2017</h1>
        <div id="controls">
            X-Axis: <select id="xVariable" class="variable"></select><br>
            Y-Axis: <select id="yVariable" class="variable"></select><br>
            Size: <select id="sizeVariable" class="variable"></select>
        </div>
        <div class="grid-layout">
            <div class="container" id="chartP">
                <!-- <h2>Patuxent</h2> -->
                <div class="vis" id="visP"></div>
            </div>

            <div class="container" id="chartH">
                <!-- <h2>Hagerstown</h2> -->
                <div class="vis" id="visH"></div>
            </div>

            <div class="container" id="chartB">
                <!-- <h2>Baltimore</h2> -->
                <div class="vis" id="visB"></div>
            </div>

            <div class="container" id="chartO">
                <!-- <h2>Ocean City</h2> -->
                <div class="vis" id="visO"></div>
            </div>
        </div>
    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/d3-simple-slider"></script>
    <script src="./script.js"></script>
</body>

</html>
